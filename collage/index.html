      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .foto:hover {
      transform: scale(1.05);
    }

    .foto img, .foto video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

  pointer-events: none;
